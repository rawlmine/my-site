    <style>
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #3a3a3a;
        }

        header {
            background: #1b1b1b;
            color: white;
            padding: 5px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: rgb(255, 255, 255);

        .hero {
            height: 85vh;
            background: linear-gradient(to bottom, #1b1b1b, #b1534c);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: rgb(255, 255, 255);
            text-align: center
        }
        .btn {
            background: rgb(172, 9, 9);
            color: #333;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }
        .grid {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

        .tile {
    width: 200px;
    padding: 20px;
    background: #f2f2f2;
    border-radius: 12px;
    text-decoration: none;
    color: black;
    transition: 0.3s;
    display: block;
}

.tile:hover {
    background: #ddd;
    transform: translateY(-5px);
}
